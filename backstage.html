<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script src="backstage-session.js"></script>
  <script>
    try {
      if (sessionStorage.getItem('liuzimo_backstage_ok') !== '1') {
        window.location.replace('login.html');
      }
    } catch (e) {
      window.location.replace('login.html');
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Backstage — Zimo Liu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scrollbar-width: none; }
    html::-webkit-scrollbar { display: none; }

    body {
      background: #07080d;
      color: #c8ccd4;
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      overflow-x: hidden;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body::-webkit-scrollbar { display: none; }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .backstage-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .backstage-card {
      width: 100%;
      max-width: 26rem;
      padding: 2rem 1.75rem;
      border: 1px solid rgba(100, 120, 180, 0.22);
      border-radius: 12px;
      background: rgba(10, 12, 20, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .backstage-card h1 {
      font-family: "Cormorant Garamond", "Georgia", serif;
      font-size: clamp(1.85rem, 4.5vw, 2.5rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #e4e7ed;
      margin-bottom: 0.75rem;
    }

    .backstage-card p {
      font-size: 0.95rem;
      line-height: 1.65;
      color: #7a8199;
      font-weight: 300;
      margin-bottom: 1.75rem;
    }

    .backstage-actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    .backstage-actions a,
    .backstage-actions button {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .btn-home {
      padding: 0.65rem 1.25rem;
      color: #c8ccd4;
      background: rgba(60, 75, 120, 0.35);
      border: 1px solid rgba(140, 170, 255, 0.25);
      border-radius: 6px;
      width: 100%;
      max-width: 16rem;
    }

    .btn-home:hover:not(:disabled) {
      background: rgba(80, 100, 160, 0.45);
      border-color: rgba(160, 190, 255, 0.4);
      color: #e4e7ed;
    }

    .btn-home:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-signout {
      background: none;
      border: none;
      color: #5a617a;
      padding: 0.35rem;
    }

    .btn-signout:hover {
      color: #b08088;
    }

    .btn-signout:focus-visible {
      outline: 2px solid rgba(140, 170, 255, 0.45);
      outline-offset: 4px;
      border-radius: 4px;
    }

    .backstage-card .btn-reload {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6d758c;
      background: transparent;
      border: 1px solid rgba(100, 120, 180, 0.28);
      border-radius: 5px;
      padding: 0.32rem 0.55rem;
      margin-top: -0.75rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .backstage-card .btn-reload:hover {
      color: #a8b0cc;
      border-color: rgba(140, 170, 255, 0.4);
    }

    .backstage-card .btn-reload:focus-visible {
      outline: 2px solid rgba(140, 170, 255, 0.45);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>
  <main class="backstage-wrap">
    <div class="backstage-card">
      <h1>Backstage</h1>
      <p>You’re signed in. Write posts in English in <strong>posts/posts.txt</strong>, run <code>node scripts/sync-drafts.mjs</code>, then add <strong>zhTitle</strong> / <strong>zhBody</strong> in <code>posts/*.json</code> if needed and push. Re-running sync keeps existing Chinese fields.</p>
      <p style="font-size:0.85rem;margin-bottom:0.5rem;"><a href="https://github.com/liusida/liuzimo.cn/blob/main/posts/posts.txt" target="_blank" rel="noopener" style="color:#8c9abd;">Edit posts source</a> · <a href="https://github.com/liusida/liuzimo.cn/tree/main/posts" target="_blank" rel="noopener" style="color:#8c9abd;">posts folder</a></p>
      <button type="button" class="btn-reload" id="reload-no-cache" title="Load this page again without using a cached copy">Reload (no cache)</button>
      <div class="backstage-actions">
        <button type="button" class="btn-home" id="download-posts">Download all posts (zip)</button>
        <a class="btn-home" href="index.html">Home</a>
        <button type="button" class="btn-signout" id="sign-out">Sign out</button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    (function () {
      function safeFileName(id) {
        return String(id || 'post').replace(/[^a-zA-Z0-9._-]+/g, '-').replace(/^-+|-+$/g, '') || 'post';
      }

      function utcOffsetLabel(d) {
        if (!(d instanceof Date) || isNaN(d.getTime())) return '';
        var offsetMin = -d.getTimezoneOffset();
        var sign = offsetMin >= 0 ? '+' : '-';
        var abs = Math.abs(offsetMin);
        var h = Math.floor(abs / 60);
        var m = abs % 60;
        if (m === 0) return 'UTC' + sign + h;
        return 'UTC' + sign + h + ':' + (m < 10 ? '0' : '') + m;
      }

      function formatReadableDate(d) {
        if (!(d instanceof Date) || isNaN(d.getTime())) return '';
        var out;
        try {
          out = new Intl.DateTimeFormat(undefined, {
            dateStyle: 'medium',
            timeStyle: 'short'
          }).format(d);
        } catch (e) {
          out = '';
        }
        if (!out || !String(out).trim()) {
          try {
            out = d.toLocaleString(undefined, {
              year: 'numeric',
              month: 'short',
              day: 'numeric',
              hour: 'numeric',
              minute: '2-digit'
            });
          } catch (e3) {
            out = d.toLocaleString();
          }
        }
        var u = utcOffsetLabel(d);
        if (out && u) return String(out).trim() + ' (' + u + ')';
        return out || '';
      }

      function formatPostTxt(p) {
        var s = '';
        s += 'id: ' + (p.id || '') + '\n';
        s += 'date & time: ' + formatReadableDate(new Date(p.dateIso || '')) + '\n\n';
        s += '--- English ---\n';
        s += (p.title || '') + '\n\n';
        s += (p.body != null ? p.body : '') + '\n';
        if ((p.zhTitle && String(p.zhTitle).trim()) || (p.zhBody != null && String(p.zhBody).trim())) {
          s += '\n--- Chinese ---\n';
          s += (p.zhTitle || '') + '\n\n';
          s += p.zhBody != null ? p.zhBody : '';
          s += '\n';
        }
        return s;
      }

      var btn = document.getElementById('download-posts');
      if (!btn) return;

      btn.addEventListener('click', function () {
        if (typeof JSZip === 'undefined') {
          alert('ZIP library failed to load. Check your connection and try again.');
          return;
        }

        if (!window.confirm('Download all posts as a ZIP file (text files in a posts folder)?')) {
          return;
        }

        btn.disabled = true;
        var label = btn.textContent;

        fetch(new URL('posts/manifest.json', window.location.href), { cache: 'no-store' })
          .then(function (res) {
            if (!res.ok) throw new Error('manifest');
            return res.json();
          })
          .then(function (manifest) {
            var entries = (manifest && manifest.entries ? manifest.entries : []).filter(function (e) {
              return e && e.id;
            });
            if (!entries.length) {
              alert('No posts to download yet.');
              return;
            }

            var zip = new JSZip();
            var folder = zip.folder('posts');
            var base = window.location.href;

            return Promise.all(
              entries.map(function (e) {
                var u = new URL('posts/' + encodeURIComponent(e.id) + '.json', base);
                return fetch(u.toString(), { cache: 'no-store' }).then(function (r) {
                  if (!r.ok) throw new Error('post ' + e.id);
                  return r.json();
                });
              })
            ).then(function (posts) {
              posts.forEach(function (p) {
                folder.file(safeFileName(p.id) + '.txt', formatPostTxt(p));
              });
              return zip.generateAsync({ type: 'blob' });
            });
          })
          .then(function (blob) {
            if (!blob) return;
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'liuzimo-posts.zip';
            a.rel = 'noopener';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
          })
          .catch(function (err) {
            alert('Could not build download: ' + (err && err.message ? err.message : String(err)));
          })
          .then(function () {
            btn.disabled = false;
            btn.textContent = label;
          });
      });
    })();
  </script>
  <script>
    document.getElementById('reload-no-cache').addEventListener('click', function () {
      var u = new URL(window.location.href);
      u.searchParams.set('_', String(Date.now()));
      window.location.replace(u.toString());
    });
  </script>
  <script>
    document.getElementById('sign-out').addEventListener('click', function () {
      try {
        sessionStorage.removeItem('liuzimo_backstage_ok');
      } catch (e) {}
      window.location.href = 'login.html';
    });
  </script>
  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let width, height, nodes, dpr, connectDist, pointerDist;

    const SPEED = 0.15;

    function isMobile() {
      return window.innerWidth < 768;
    }

    function resize() {
      dpr = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      connectDist = isMobile() ? 120 : 160;
      pointerDist = isMobile() ? 150 : 200;
    }

    function createNodes() {
      const area = width * height;
      const baseCount = isMobile() ? 45 : 80;
      const density = area / (1920 * 1080);
      const count = Math.max(20, Math.round(baseCount * density));
      nodes = Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * SPEED,
        vy: (Math.random() - 0.5) * SPEED,
      }));
    }

    const pointer = { x: -1000, y: -1000, active: false };

    document.addEventListener('mousemove', e => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
      pointer.active = true;
    });
    document.addEventListener('mouseleave', () => {
      pointer.active = false;
      pointer.x = -1000;
      pointer.y = -1000;
    });

    document.addEventListener('touchmove', e => {
      const t = e.touches[0];
      pointer.x = t.clientX;
      pointer.y = t.clientY;
      pointer.active = true;
    }, { passive: true });
    document.addEventListener('touchstart', e => {
      const t = e.touches[0];
      pointer.x = t.clientX;
      pointer.y = t.clientY;
      pointer.active = true;
    }, { passive: true });
    document.addEventListener('touchend', () => {
      pointer.active = false;
      pointer.x = -1000;
      pointer.y = -1000;
    });

    function tick() {
      ctx.clearRect(0, 0, width, height);

      for (const n of nodes) {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > width) n.vx *= -1;
        if (n.y < 0 || n.y > height) n.vy *= -1;
      }

      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < connectDist) {
            const alpha = (1 - dist / connectDist) * 0.15;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(100,120,180,${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      if (pointer.active) {
        for (let i = 0; i < nodes.length; i++) {
          const mdx = nodes[i].x - pointer.x;
          const mdy = nodes[i].y - pointer.y;
          const mDist = Math.sqrt(mdx * mdx + mdy * mdy);

          if (mDist < pointerDist) {
            for (let j = i + 1; j < nodes.length; j++) {
              const mdx2 = nodes[j].x - pointer.x;
              const mdy2 = nodes[j].y - pointer.y;
              const mDist2 = Math.sqrt(mdx2 * mdx2 + mdy2 * mdy2);
              if (mDist2 > pointerDist) continue;

              const dx = nodes[i].x - nodes[j].x;
              const dy = nodes[i].y - nodes[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < pointerDist) {
                const alpha = (1 - dist / pointerDist) * 0.25;
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.strokeStyle = `rgba(140,170,255,${alpha})`;
                ctx.lineWidth = 0.6;
                ctx.stroke();
              }
            }
          }
        }
      }

      const nodeRadius = isMobile() ? 1.2 : 1.5;
      for (const n of nodes) {
        let glow = 0.3;
        if (pointer.active) {
          const mdx = n.x - pointer.x;
          const mdy = n.y - pointer.y;
          const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
          if (mDist < pointerDist) glow = 0.7;
        }
        ctx.beginPath();
        ctx.arc(n.x, n.y, nodeRadius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(140,170,255,${glow})`;
        ctx.fill();
      }

      requestAnimationFrame(tick);
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { resize(); createNodes(); }, 150);
    });
    resize();
    createNodes();
    tick();
  </script>
</body>
</html>
