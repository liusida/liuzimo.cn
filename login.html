<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script src="backstage-session.js"></script>
  <script>
    try {
      if (sessionStorage.getItem('liuzimo_site_locale') === 'zh') {
        window.location.replace('zh.html');
      }
    } catch (e) {}
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Zimo Liu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scrollbar-width: none;
    }

    html::-webkit-scrollbar {
      display: none;
    }

    body {
      background: #07080d;
      color: #c8ccd4;
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      overflow-x: hidden;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-card {
      width: 100%;
      max-width: 22rem;
      padding: 2rem 1.75rem;
      border: 1px solid rgba(100, 120, 180, 0.22);
      border-radius: 12px;
      background: rgba(10, 12, 20, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    .login-title {
      font-family: "Cormorant Garamond", "Georgia", serif;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #e4e7ed;
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .login-form label {
      display: block;
      margin-bottom: 1.1rem;
      text-align: left;
    }

    .login-form .label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #5a617a;
      margin-bottom: 0.45rem;
    }

    .login-form .label.label-sentence {
      text-transform: none;
      letter-spacing: 0.1em;
    }

    .login-form input {
      width: 100%;
      padding: 0.7rem 0.85rem;
      font-size: 0.95rem;
      color: #e4e7ed;
      background: rgba(12, 14, 20, 0.9);
      border: 1px solid rgba(90, 97, 122, 0.45);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-form input:focus {
      border-color: rgba(140, 170, 255, 0.4);
      box-shadow: 0 0 0 3px rgba(100, 140, 220, 0.12);
    }

    .login-submit {
      width: 100%;
      margin-top: 0.35rem;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c8ccd4;
      background: rgba(60, 75, 120, 0.35);
      border: 1px solid rgba(140, 170, 255, 0.25);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .login-submit:hover {
      background: rgba(80, 100, 160, 0.45);
      border-color: rgba(160, 190, 255, 0.4);
      color: #e4e7ed;
    }

    .back-nav {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid rgba(90, 97, 122, 0.22);
      text-align: center;
    }

    .back-btn {
      background: none;
      border: none;
      padding: 0.35rem 0.75rem;
      font: inherit;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #5a617a;
      cursor: pointer;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: #e4e7ed;
    }

    .back-btn:focus-visible {
      outline: 2px solid rgba(140, 170, 255, 0.45);
      outline-offset: 4px;
      border-radius: 4px;
    }

    .login-error {
      margin-bottom: 0.85rem;
      font-size: 0.8rem;
      line-height: 1.4;
      color: #b08088;
      text-align: center;
    }

    .login-error[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>
  <main class="login-wrap">
    <div class="login-card">
      <h1 class="login-title">Sign in</h1>
      <form class="login-form" id="login-form" action="#" method="post" autocomplete="on">
        <label>
          <span class="label label-sentence">Username</span>
          <input type="text" name="username" id="username" autocomplete="username" value="zimo" required>
        </label>
        <label>
          <span class="label">Password</span>
          <input type="password" name="password" id="password" autocomplete="current-password" required>
        </label>
        <p class="login-error" id="login-error" hidden role="alert">Invalid username or password.</p>
        <button type="submit" class="login-submit">Sign in (Backstage)</button>
      </form>
      <nav class="back-nav" aria-label="Back">
        <button type="button" class="back-btn" id="back-btn">Back</button>
      </nav>
    </div>
  </main>

  <script>
    (function () {
      var USER_SHA256 = 'c1c224b03cd9bc7b6a86d77f5dace40191766c485cd55dc48caf9ac873335d6f';
      var PASS_SHA256 = 'c127129d984b9abcd8b582f42caf7989daa212d8094dec98783cb71d6d7da3ac';

      function sha256Hex(str) {
        return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)).then(function (buf) {
          return Array.from(new Uint8Array(buf)).map(function (b) {
            return ('0' + b.toString(16)).slice(-2);
          }).join('');
        });
      }

      document.getElementById('login-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var user = document.getElementById('username').value.trim();
        var pass = document.getElementById('password').value;
        var err = document.getElementById('login-error');

        if (!window.crypto || !window.crypto.subtle) {
          err.textContent = 'Sign-in needs HTTPS (or localhost).';
          err.hidden = false;
          return;
        }

        Promise.all([sha256Hex(user), sha256Hex(pass)]).then(function (hashes) {
          if (hashes[0] === USER_SHA256 && hashes[1] === PASS_SHA256) {
            err.hidden = true;
            err.textContent = 'Invalid username or password.';
            try {
              sessionStorage.setItem('liuzimo_backstage_ok', '1');
            } catch (ignore) {}
            window.location.href = 'backstage.html';
          } else {
            err.hidden = false;
          }
        }).catch(function () {
          err.textContent = 'Could not verify. Try again.';
          err.hidden = false;
        });
      });
    })();
    document.getElementById('back-btn').addEventListener('click', function () {
      window.location.href = 'index.html';
    });
  </script>
  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let width, height, nodes, dpr, connectDist, pointerDist;

    const SPEED = 0.15;

    function isMobile() {
      return window.innerWidth < 768;
    }

    function resize() {
      dpr = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      connectDist = isMobile() ? 120 : 160;
      pointerDist = isMobile() ? 150 : 200;
    }

    function createNodes() {
      const area = width * height;
      const baseCount = isMobile() ? 45 : 80;
      const density = area / (1920 * 1080);
      const count = Math.max(20, Math.round(baseCount * density));
      nodes = Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * SPEED,
        vy: (Math.random() - 0.5) * SPEED,
      }));
    }

    const pointer = { x: -1000, y: -1000, active: false };

    document.addEventListener('mousemove', e => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
      pointer.active = true;
    });
    document.addEventListener('mouseleave', () => {
      pointer.active = false;
      pointer.x = -1000;
      pointer.y = -1000;
    });

    document.addEventListener('touchmove', e => {
      const t = e.touches[0];
      pointer.x = t.clientX;
      pointer.y = t.clientY;
      pointer.active = true;
    }, { passive: true });
    document.addEventListener('touchstart', e => {
      const t = e.touches[0];
      pointer.x = t.clientX;
      pointer.y = t.clientY;
      pointer.active = true;
    }, { passive: true });
    document.addEventListener('touchend', () => {
      pointer.active = false;
      pointer.x = -1000;
      pointer.y = -1000;
    });

    function tick() {
      ctx.clearRect(0, 0, width, height);

      for (const n of nodes) {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > width) n.vx *= -1;
        if (n.y < 0 || n.y > height) n.vy *= -1;
      }

      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < connectDist) {
            const alpha = (1 - dist / connectDist) * 0.15;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(100,120,180,${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      if (pointer.active) {
        for (let i = 0; i < nodes.length; i++) {
          const mdx = nodes[i].x - pointer.x;
          const mdy = nodes[i].y - pointer.y;
          const mDist = Math.sqrt(mdx * mdx + mdy * mdy);

          if (mDist < pointerDist) {
            for (let j = i + 1; j < nodes.length; j++) {
              const mdx2 = nodes[j].x - pointer.x;
              const mdy2 = nodes[j].y - pointer.y;
              const mDist2 = Math.sqrt(mdx2 * mdx2 + mdy2 * mdy2);
              if (mDist2 > pointerDist) continue;

              const dx = nodes[i].x - nodes[j].x;
              const dy = nodes[i].y - nodes[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < pointerDist) {
                const alpha = (1 - dist / pointerDist) * 0.25;
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.strokeStyle = `rgba(140,170,255,${alpha})`;
                ctx.lineWidth = 0.6;
                ctx.stroke();
              }
            }
          }
        }
      }

      const nodeRadius = isMobile() ? 1.2 : 1.5;
      for (const n of nodes) {
        let glow = 0.3;
        if (pointer.active) {
          const mdx = n.x - pointer.x;
          const mdy = n.y - pointer.y;
          const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
          if (mDist < pointerDist) glow = 0.7;
        }
        ctx.beginPath();
        ctx.arc(n.x, n.y, nodeRadius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(140,170,255,${glow})`;
        ctx.fill();
      }

      requestAnimationFrame(tick);
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { resize(); createNodes(); }, 150);
    });
    resize();
    createNodes();
    tick();
  </script>
</body>
</html>
