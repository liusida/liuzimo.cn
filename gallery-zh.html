<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <script src="backstage-session.js"></script>
  <script>try { sessionStorage.setItem('liuzimo_site_locale', 'zh'); } catch (e) {}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>照片画廊 — 刘子墨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scrollbar-width: none; }
    html::-webkit-scrollbar { display: none; }

    body {
      background: #07080d;
      color: #c8ccd4;
      font-family: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      overflow-x: hidden;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body::-webkit-scrollbar { display: none; }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .site-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.35rem 1.25rem;
      padding: 0.65rem 1rem;
      background: rgba(7, 8, 13, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(100, 120, 180, 0.14);
    }

    .site-nav a {
      color: #6d758c;
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      white-space: nowrap;
      transition: color 0.2s;
    }

    .site-nav a:hover { color: #e4e7ed; }

    .site-nav a:focus-visible {
      outline: 2px solid rgba(140, 170, 255, 0.45);
      outline-offset: 4px;
      border-radius: 4px;
    }

    .site-nav a[aria-current="page"] { color: #a8b0cc; }

    .gallery-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      padding: clamp(4.25rem, 10vh, 5rem) 1.5rem 3rem;
      max-width: 56rem;
      margin: 0 auto;
    }

    .gallery-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .gallery-title {
      font-family: "Noto Serif SC", "Songti SC", "STSong", Georgia, serif;
      font-size: clamp(1.85rem, 4.5vw, 2.5rem);
      font-weight: 400;
      letter-spacing: 0.14em;
      color: #e4e7ed;
      margin-bottom: 0.65rem;
    }

    .gallery-lead {
      font-size: 0.95rem;
      line-height: 1.75;
      color: #7a8199;
      font-weight: 400;
      letter-spacing: 0.03em;
      max-width: 32rem;
      margin: 0 auto;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(9.5rem, 1fr));
      gap: 1rem;
    }

    .gallery-slot {
      aspect-ratio: 1;
      border: 1px dashed rgba(100, 120, 180, 0.32);
      border-radius: 10px;
      background: rgba(10, 12, 20, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a5168;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
    }

    @media (max-width: 520px) {
      .site-nav {
        gap: 0.35rem 0.75rem;
        padding: 0.55rem 0.75rem;
      }
      .site-nav a { font-size: 0.6rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .site-nav a { transition: none; }
    }
  </style>
</head>
<body class="zh">
  <canvas id="bg" aria-hidden="true"></canvas>
  <nav class="site-nav" aria-label="页面">
    <a href="zh.html">首页</a>
    <a href="zh.html#my-journey">我的旅程</a>
    <a href="zh.html#daily-recording">日常记录</a>
    <a href="gallery-zh.html" aria-current="page">画廊</a>
    <a href="contact-zh.html">联系</a>
    <a href="gallery.html" hreflang="en">English</a>
  </nav>
  <main class="gallery-wrap">
    <header class="gallery-header">
      <h1 class="gallery-title">照片画廊</h1>
      <p class="gallery-lead">展示照片的地方。准备好以后，可在每个格子里加入图片，或改成你自己的版式。</p>
    </header>
    <div class="gallery-grid" role="list">
      <div class="gallery-slot" role="listitem" aria-label="空照片位"></div>
      <div class="gallery-slot" role="listitem" aria-label="空照片位"></div>
      <div class="gallery-slot" role="listitem" aria-label="空照片位"></div>
      <div class="gallery-slot" role="listitem" aria-label="空照片位"></div>
      <div class="gallery-slot" role="listitem" aria-label="空照片位"></div>
      <div class="gallery-slot" role="listitem" aria-label="空照片位"></div>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let width, height, nodes, dpr, connectDist, pointerDist;

    const SPEED = 0.15;

    function isMobile() {
      return window.innerWidth < 768;
    }

    function resize() {
      dpr = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      connectDist = isMobile() ? 120 : 160;
      pointerDist = isMobile() ? 150 : 200;
    }

    function createNodes() {
      const area = width * height;
      const baseCount = isMobile() ? 45 : 80;
      const density = area / (1920 * 1080);
      const count = Math.max(20, Math.round(baseCount * density));
      nodes = Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * SPEED,
        vy: (Math.random() - 0.5) * SPEED,
      }));
    }

    const pointer = { x: -1000, y: -1000, active: false };

    document.addEventListener('mousemove', e => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
      pointer.active = true;
    });
    document.addEventListener('mouseleave', () => {
      pointer.active = false;
      pointer.x = -1000;
      pointer.y = -1000;
    });

    document.addEventListener('touchmove', e => {
      const t = e.touches[0];
      pointer.x = t.clientX;
      pointer.y = t.clientY;
      pointer.active = true;
    }, { passive: true });
    document.addEventListener('touchstart', e => {
      const t = e.touches[0];
      pointer.x = t.clientX;
      pointer.y = t.clientY;
      pointer.active = true;
    }, { passive: true });
    document.addEventListener('touchend', () => {
      pointer.active = false;
      pointer.x = -1000;
      pointer.y = -1000;
    });

    function tick() {
      ctx.clearRect(0, 0, width, height);

      for (const n of nodes) {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > width) n.vx *= -1;
        if (n.y < 0 || n.y > height) n.vy *= -1;
      }

      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < connectDist) {
            const alpha = (1 - dist / connectDist) * 0.15;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(100,120,180,${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      if (pointer.active) {
        for (let i = 0; i < nodes.length; i++) {
          const mdx = nodes[i].x - pointer.x;
          const mdy = nodes[i].y - pointer.y;
          const mDist = Math.sqrt(mdx * mdx + mdy * mdy);

          if (mDist < pointerDist) {
            for (let j = i + 1; j < nodes.length; j++) {
              const mdx2 = nodes[j].x - pointer.x;
              const mdy2 = nodes[j].y - pointer.y;
              const mDist2 = Math.sqrt(mdx2 * mdx2 + mdy2 * mdy2);
              if (mDist2 > pointerDist) continue;

              const dx = nodes[i].x - nodes[j].x;
              const dy = nodes[i].y - nodes[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < pointerDist) {
                const alpha = (1 - dist / pointerDist) * 0.25;
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.strokeStyle = `rgba(140,170,255,${alpha})`;
                ctx.lineWidth = 0.6;
                ctx.stroke();
              }
            }
          }
        }
      }

      const nodeRadius = isMobile() ? 1.2 : 1.5;
      for (const n of nodes) {
        let glow = 0.3;
        if (pointer.active) {
          const mdx = n.x - pointer.x;
          const mdy = n.y - pointer.y;
          const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
          if (mDist < pointerDist) glow = 0.7;
        }
        ctx.beginPath();
        ctx.arc(n.x, n.y, nodeRadius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(140,170,255,${glow})`;
        ctx.fill();
      }

      requestAnimationFrame(tick);
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { resize(); createNodes(); }, 150);
    });
    resize();
    createNodes();
    tick();
  </script>
</body>
</html>
