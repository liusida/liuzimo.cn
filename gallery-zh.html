<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <script>try { sessionStorage.setItem('liuzimo_site_locale', 'zh'); } catch (e) {}</script>
  <script>
    try {
      /* Must match LOCK_DISABLED in gallery-lock.js — avoids a flash of the lock overlay */
      var LOCK_DISABLED = false;
      if (LOCK_DISABLED) {
        sessionStorage.setItem('liuzimo_gallery_unlock', '1');
        sessionStorage.setItem('liuzimo_gallery_key', 'happyeggie');
        document.documentElement.classList.add('gallery-unlocked');
      } else if (sessionStorage.getItem('liuzimo_gallery_unlock') === '1') {
        document.documentElement.classList.add('gallery-unlocked');
      }
    } catch (e) {}
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>照片画廊 — 刘子墨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scrollbar-width: none; }
    html::-webkit-scrollbar { display: none; }

    body {
      background: #07080d;
      color: #c8ccd4;
      font-family: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
      overflow-x: hidden;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    body::-webkit-scrollbar { display: none; }

    canvas#bg {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .site-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.35rem 1.25rem;
      padding: 0.65rem 1rem;
      background: rgba(7, 8, 13, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(100, 120, 180, 0.14);
    }

    .site-nav a {
      color: #6d758c;
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      white-space: nowrap;
      transition: color 0.2s;
    }

    .site-nav a:hover { color: #e4e7ed; }

    .site-nav a:focus-visible {
      outline: 2px solid rgba(140, 170, 255, 0.45);
      outline-offset: 4px;
      border-radius: 4px;
    }

    .site-nav a[aria-current="page"] { color: #a8b0cc; }

    .gallery-wrap {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      min-height: 100dvh;
      padding: clamp(4.25rem, 10vh, 5rem) 1.5rem 3rem;
      max-width: 56rem;
      margin: 0 auto;
    }

    .gallery-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .gallery-title {
      font-family: "Noto Serif SC", "Songti SC", "STSong", Georgia, serif;
      font-size: clamp(1.85rem, 4.5vw, 2.5rem);
      font-weight: 400;
      letter-spacing: 0.14em;
      color: #e4e7ed;
      margin-bottom: 0.65rem;
    }

    .gallery-lead {
      font-size: 0.95rem;
      line-height: 1.75;
      color: #7a8199;
      font-weight: 400;
      letter-spacing: 0.03em;
      max-width: 36rem;
      margin: 0 auto;
    }

    .gallery-tz-note {
      font-size: 0.78rem;
      line-height: 1.55;
      color: #5a617a;
      font-weight: 400;
      max-width: 36rem;
      margin: 0.75rem auto 0;
      letter-spacing: 0.02em;
    }

    .gallery-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.5rem 0.85rem;
      margin: 1.35rem auto 0;
      max-width: 36rem;
    }

    .gallery-sort-label {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: #6d758c;
    }

    .gallery-sort {
      min-width: 12rem;
      max-width: 100%;
      padding: 0.5rem 0.85rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: #c8ccd4;
      background: rgba(10, 12, 20, 0.9);
      border: 1px solid rgba(100, 120, 180, 0.35);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .gallery-sort:hover,
    .gallery-sort:focus {
      border-color: rgba(140, 170, 255, 0.4);
      color: #e4e7ed;
      outline: none;
    }

    .gallery-sort:focus-visible {
      outline: 2px solid rgba(140, 170, 255, 0.45);
      outline-offset: 3px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 10.5rem), 1fr));
      gap: 1.25rem 1rem;
      align-items: start;
    }

    .gallery-item {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .gallery-thumb-wrap {
      margin: 0;
      min-width: 0;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(100, 120, 180, 0.22);
      background: rgba(10, 12, 20, 0.55);
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .gallery-thumb-wrap:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
    }

    .gallery-thumb-wrap:focus {
      outline: 2px solid rgba(140, 170, 255, 0.55);
      outline-offset: 3px;
    }

    .gallery-thumb-wrap:focus:not(:focus-visible) {
      outline: none;
    }

    .gallery-thumb-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .gallery-caption {
      font-size: 0.72rem;
      line-height: 1.5;
      color: #7a8199;
      font-weight: 400;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .gallery-caption-time {
      color: #9aa3b8;
    }

    .gallery-load-err {
      grid-column: 1 / -1;
      text-align: center;
      color: #9aa3b8;
      font-size: 0.88rem;
    }

    .gallery-lightbox {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .gallery-lightbox[hidden] {
      display: none !important;
    }

    .gallery-lightbox-backdrop {
      position: absolute;
      inset: 0;
      border: none;
      padding: 0;
      margin: 0;
      background: rgba(5, 6, 10, 0.92);
      cursor: zoom-out;
    }

    .gallery-lightbox-panel {
      position: relative;
      z-index: 1;
      max-width: min(96vw, 1400px);
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
      pointer-events: none;
    }

    .gallery-lightbox-panel .gallery-lightbox-img {
      pointer-events: auto;
      max-width: min(96vw, 1400px);
      max-height: min(78vh, 920px);
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 28px 64px rgba(0, 0, 0, 0.55);
    }

    .gallery-lightbox-close {
      position: fixed;
      top: max(0.75rem, env(safe-area-inset-top));
      right: max(0.75rem, env(safe-area-inset-right));
      z-index: 101;
      pointer-events: auto;
      width: 2.25rem;
      height: 2.25rem;
      border: 1px solid rgba(120, 140, 200, 0.35);
      border-radius: 8px;
      background: rgba(20, 22, 32, 0.9);
      color: #c8ccd4;
      font-size: 1.35rem;
      line-height: 1;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .gallery-lightbox-close:hover {
      color: #e4e7ed;
      border-color: rgba(160, 190, 255, 0.45);
    }

    .gallery-lightbox-caption {
      pointer-events: auto;
      text-align: center;
      font-size: 0.84rem;
      line-height: 1.55;
      color: #b4bac8;
      max-width: 40rem;
    }

    .gallery-lightbox-caption strong {
      font-weight: 500;
      color: #e4e7ed;
    }

    @media (max-width: 520px) {
      .site-nav {
        gap: 0.35rem 0.75rem;
        padding: 0.55rem 0.75rem;
      }
      .site-nav a { font-size: 0.6rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .site-nav a { transition: none; }
      .gallery-thumb-wrap {
        transition: none;
      }
      .gallery-thumb-wrap:hover {
        transform: none;
      }
    }

    .gallery-lock {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: rgba(5, 6, 10, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    html.gallery-unlocked .gallery-lock {
      display: none !important;
    }

    .gallery-lock-card {
      width: 100%;
      max-width: 20rem;
      padding: 1.75rem 1.5rem;
      border: 1px solid rgba(100, 120, 180, 0.28);
      border-radius: 12px;
      background: rgba(10, 12, 20, 0.88);
      text-align: center;
    }

    .gallery-lock-title {
      font-family: "Noto Serif SC", "Noto Sans SC", serif;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #e4e7ed;
      margin-bottom: 0.5rem;
    }

    .gallery-lock-lead {
      font-size: 0.85rem;
      color: #7a8199;
      margin-bottom: 1.25rem;
      line-height: 1.65;
    }

    .gallery-lock-card label {
      display: block;
      margin-bottom: 0.75rem;
    }

    .gallery-lock-card input[type="password"] {
      width: 100%;
      padding: 0.55rem 0.75rem;
      font-size: 0.88rem;
      color: #c8ccd4;
      background: rgba(10, 12, 20, 0.9);
      border: 1px solid rgba(100, 120, 180, 0.35);
      border-radius: 8px;
    }

    .gallery-lock-card input:focus {
      outline: 2px solid rgba(140, 170, 255, 0.45);
      outline-offset: 2px;
    }

    .gallery-lock-card button[type="submit"] {
      margin-top: 0.25rem;
      padding: 0.55rem 1.25rem;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: #c8ccd4;
      background: rgba(60, 75, 120, 0.45);
      border: 1px solid rgba(140, 170, 255, 0.3);
      border-radius: 6px;
      cursor: pointer;
    }

    .gallery-lock-card button[type="submit"]:hover {
      background: rgba(80, 100, 160, 0.5);
      color: #e4e7ed;
    }

    .gallery-lock-err {
      font-size: 0.78rem;
      color: #c08088;
      margin-top: 0.5rem;
    }

    .gallery-lock-sr {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body class="zh">
  <canvas id="bg" aria-hidden="true"></canvas>
  <nav class="site-nav" aria-label="页面">
    <a href="zh.html">首页</a>
    <a href="zh.html#my-journey">我的旅程</a>
    <a href="zh.html#daily-recording">日常记录</a>
    <a href="gallery-zh.html" aria-current="page">画廊</a>
    <a href="contact-zh.html">联系</a>
    <a href="gallery.html" hreflang="en">English</a>
  </nav>
  <div id="gallery-lock" class="gallery-lock" role="dialog" aria-modal="true" aria-labelledby="gallery-lock-heading">
    <form id="gallery-lock-form" class="gallery-lock-card" autocomplete="off">
      <p id="gallery-lock-heading" class="gallery-lock-title">照片画廊</p>
      <p class="gallery-lock-lead">请输入密码以查看照片。</p>
      <label>
        <span class="gallery-lock-sr">密码</span>
        <input type="password" id="gallery-lock-input" name="gallery-password" autocomplete="current-password" required>
      </label>
      <p id="gallery-lock-err" class="gallery-lock-err" hidden>密码不正确。</p>
      <button type="submit">解锁</button>
    </form>
  </div>
  <main class="gallery-wrap">
    <header class="gallery-header">
      <h1 class="gallery-title">照片画廊</h1>
      <p class="gallery-lead">images/gallery.json 提供每张照片的 EXIF 时间。可用下方菜单调整排序。</p>
      <p id="gallery-tz-note" class="gallery-tz-note" aria-live="polite"></p>
      <div class="gallery-toolbar">
        <label for="gallery-sort" class="gallery-sort-label">排序</label>
        <select id="gallery-sort" class="gallery-sort" autocomplete="off" aria-describedby="gallery-tz-note">
          <option value="exif-desc" selected>拍摄时间（新→旧）</option>
          <option value="exif-asc">拍摄时间（旧→新）</option>
        </select>
      </div>
    </header>
    <div id="gallery-grid" class="gallery-grid" role="list"></div>
  </main>

  <div id="gallery-lightbox" class="gallery-lightbox" hidden role="dialog" aria-modal="true" aria-label="放大照片">
    <button type="button" class="gallery-lightbox-backdrop" aria-label="关闭"></button>
    <div class="gallery-lightbox-panel">
      <button type="button" class="gallery-lightbox-close" aria-label="关闭">&times;</button>
      <img class="gallery-lightbox-img" alt="" tabindex="-1">
      <p class="gallery-lightbox-caption"></p>
    </div>
  </div>

  <script src="gallery-lock.js?v=4" defer></script>
  <script src="gallery-ui.js?v=11" defer></script>
  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let width, height, nodes, dpr, connectDist, pointerDist;

    const SPEED = 0.15;

    function isMobile() {
      return window.innerWidth < 768;
    }

    function resize() {
      dpr = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      connectDist = isMobile() ? 120 : 160;
      pointerDist = isMobile() ? 150 : 200;
    }

    function createNodes() {
      const area = width * height;
      const baseCount = isMobile() ? 45 : 80;
      const density = area / (1920 * 1080);
      const count = Math.max(20, Math.round(baseCount * density));
      nodes = Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * SPEED,
        vy: (Math.random() - 0.5) * SPEED,
      }));
    }

    const pointer = { x: -1000, y: -1000, active: false };

    document.addEventListener('mousemove', e => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
      pointer.active = true;
    });
    document.addEventListener('mouseleave', () => {
      pointer.active = false;
      pointer.x = -1000;
      pointer.y = -1000;
    });

    document.addEventListener('touchmove', e => {
      const t = e.touches[0];
      pointer.x = t.clientX;
      pointer.y = t.clientY;
      pointer.active = true;
    }, { passive: true });
    document.addEventListener('touchstart', e => {
      const t = e.touches[0];
      pointer.x = t.clientX;
      pointer.y = t.clientY;
      pointer.active = true;
    }, { passive: true });
    document.addEventListener('touchend', () => {
      pointer.active = false;
      pointer.x = -1000;
      pointer.y = -1000;
    });

    function tick() {
      ctx.clearRect(0, 0, width, height);

      for (const n of nodes) {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > width) n.vx *= -1;
        if (n.y < 0 || n.y > height) n.vy *= -1;
      }

      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < connectDist) {
            const alpha = (1 - dist / connectDist) * 0.15;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(100,120,180,${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      if (pointer.active) {
        for (let i = 0; i < nodes.length; i++) {
          const mdx = nodes[i].x - pointer.x;
          const mdy = nodes[i].y - pointer.y;
          const mDist = Math.sqrt(mdx * mdx + mdy * mdy);

          if (mDist < pointerDist) {
            for (let j = i + 1; j < nodes.length; j++) {
              const mdx2 = nodes[j].x - pointer.x;
              const mdy2 = nodes[j].y - pointer.y;
              const mDist2 = Math.sqrt(mdx2 * mdx2 + mdy2 * mdy2);
              if (mDist2 > pointerDist) continue;

              const dx = nodes[i].x - nodes[j].x;
              const dy = nodes[i].y - nodes[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < pointerDist) {
                const alpha = (1 - dist / pointerDist) * 0.25;
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.strokeStyle = `rgba(140,170,255,${alpha})`;
                ctx.lineWidth = 0.6;
                ctx.stroke();
              }
            }
          }
        }
      }

      const nodeRadius = isMobile() ? 1.2 : 1.5;
      for (const n of nodes) {
        let glow = 0.3;
        if (pointer.active) {
          const mdx = n.x - pointer.x;
          const mdy = n.y - pointer.y;
          const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
          if (mDist < pointerDist) glow = 0.7;
        }
        ctx.beginPath();
        ctx.arc(n.x, n.y, nodeRadius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(140,170,255,${glow})`;
        ctx.fill();
      }

      requestAnimationFrame(tick);
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { resize(); createNodes(); }, 150);
    });
    resize();
    createNodes();
    tick();
  </script>
</body>
</html>
