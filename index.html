<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zimo Liu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }

    body {
      background: #07080d;
      color: #c8ccd4;
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      text-align: center;
      padding: 2rem;
      scroll-snap-align: start;
      scroll-snap-stop: always;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #3a4158;
      animation: hintPulse 2.8s ease-in-out infinite;
    }

    @keyframes hintPulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.9; }
    }

    .page-secondary h2 {
      font-family: "Cormorant Garamond", "Georgia", serif;
      font-size: clamp(1.8rem, 4.5vw, 2.75rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #e4e7ed;
      margin-bottom: 0.75em;
    }

    .page-secondary .blurb {
      max-width: 28rem;
      font-size: clamp(1rem, 2.2vw, 1.125rem);
      line-height: 1.75;
      color: #7a8199;
      font-weight: 300;
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-snap-type: none; scroll-behavior: auto; }
      .scroll-hint { animation: none; opacity: 0.55; }
    }

    h1 {
      font-family: "Cormorant Garamond", "Georgia", serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #e4e7ed;
      margin-bottom: 0.3em;
    }

    .subtitle {
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #5a617a;
      margin-bottom: 2.5em;
    }

    .links {
      display: flex;
      gap: 2rem;
    }

    .links a {
      color: #5a617a;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .links a:hover {
      color: #e4e7ed;
    }

    @media (max-width: 480px) {
      .links { gap: 1.5rem; }
      .links a {
        font-size: 0.8rem;
        padding: 0.5rem 0;
      }
    }

    @media (pointer: coarse) {
      .links a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>
  <main>
    <section class="page page-hero" aria-label="Intro">
      <h1>Zimo Liu</h1>
      <p class="subtitle">君子尚墨</p>
      <nav class="links">
        <a href="https://github.com/zimoliu-vt" target="_blank" rel="noopener">GitHub</a>
      </nav>
      <p class="scroll-hint">Scroll</p>
    </section>
    <section class="page page-secondary" aria-label="More">
      <h2>Hello</h2>
      <p class="blurb">
        Exploring code, interaction, and small experiments on the web. The same night sky follows you here — scroll back up whenever you like.
      </p>
    </section>
  </main>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let width, height, nodes, dpr, connectDist, pointerDist;

    const SPEED = 0.15;

    function isMobile() {
      return window.innerWidth < 768;
    }

    function resize() {
      dpr = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      connectDist = isMobile() ? 120 : 160;
      pointerDist = isMobile() ? 150 : 200;
    }

    function createNodes() {
      const area = width * height;
      const baseCount = isMobile() ? 45 : 80;
      const density = area / (1920 * 1080);
      const count = Math.max(20, Math.round(baseCount * density));
      nodes = Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * SPEED,
        vy: (Math.random() - 0.5) * SPEED,
      }));
    }

    const pointer = { x: -1000, y: -1000, active: false };

    document.addEventListener('mousemove', e => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
      pointer.active = true;
    });
    document.addEventListener('mouseleave', () => {
      pointer.active = false;
      pointer.x = -1000;
      pointer.y = -1000;
    });

    document.addEventListener('touchmove', e => {
      const t = e.touches[0];
      pointer.x = t.clientX;
      pointer.y = t.clientY;
      pointer.active = true;
    }, { passive: true });
    document.addEventListener('touchstart', e => {
      const t = e.touches[0];
      pointer.x = t.clientX;
      pointer.y = t.clientY;
      pointer.active = true;
    }, { passive: true });
    document.addEventListener('touchend', () => {
      pointer.active = false;
      pointer.x = -1000;
      pointer.y = -1000;
    });

    function tick() {
      ctx.clearRect(0, 0, width, height);

      for (const n of nodes) {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > width) n.vx *= -1;
        if (n.y < 0 || n.y > height) n.vy *= -1;
      }

      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < connectDist) {
            const alpha = (1 - dist / connectDist) * 0.15;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(100,120,180,${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      if (pointer.active) {
        for (let i = 0; i < nodes.length; i++) {
          const mdx = nodes[i].x - pointer.x;
          const mdy = nodes[i].y - pointer.y;
          const mDist = Math.sqrt(mdx * mdx + mdy * mdy);

          if (mDist < pointerDist) {
            for (let j = i + 1; j < nodes.length; j++) {
              const mdx2 = nodes[j].x - pointer.x;
              const mdy2 = nodes[j].y - pointer.y;
              const mDist2 = Math.sqrt(mdx2 * mdx2 + mdy2 * mdy2);
              if (mDist2 > pointerDist) continue;

              const dx = nodes[i].x - nodes[j].x;
              const dy = nodes[i].y - nodes[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < pointerDist) {
                const alpha = (1 - dist / pointerDist) * 0.25;
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.strokeStyle = `rgba(140,170,255,${alpha})`;
                ctx.lineWidth = 0.6;
                ctx.stroke();
              }
            }
          }
        }
      }

      const nodeRadius = isMobile() ? 1.2 : 1.5;
      for (const n of nodes) {
        let glow = 0.3;
        if (pointer.active) {
          const mdx = n.x - pointer.x;
          const mdy = n.y - pointer.y;
          const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
          if (mDist < pointerDist) glow = 0.7;
        }
        ctx.beginPath();
        ctx.arc(n.x, n.y, nodeRadius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(140,170,255,${glow})`;
        ctx.fill();
      }

      requestAnimationFrame(tick);
    }

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { resize(); createNodes(); }, 150);
    });
    resize();
    createNodes();
    tick();
  </script>
</body>
</html>
