<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zimo Liu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #07080d;
      color: #c8ccd4;
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-family: "Cormorant Garamond", "Georgia", serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 300;
      letter-spacing: 0.08em;
      color: #e4e7ed;
      margin-bottom: 0.3em;
    }

    .subtitle {
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #5a617a;
      margin-bottom: 2.5em;
    }

    .links {
      display: flex;
      gap: 2rem;
    }

    .links a {
      color: #5a617a;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .links a:hover {
      color: #e4e7ed;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="content">
    <h1>Zimo Liu</h1>
    <p class="subtitle">君子尚墨</p>
    <nav class="links">
      <a href="https://github.com/zimoliu-vt" target="_blank" rel="noopener">GitHub</a>
      <a href="https://zimoliu-vt.github.io/Car-Game/" target="_blank" rel="noopener">Car Game</a>
    </nav>
  </div>

  <script>
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let width, height, nodes, mouse;

    const NODE_COUNT_BASE = 80;
    const CONNECT_DIST = 160;
    const NODE_RADIUS = 1.5;
    const SPEED = 0.15;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    function createNodes() {
      const density = (width * height) / (1920 * 1080);
      const count = Math.round(NODE_COUNT_BASE * density);
      nodes = Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        vx: (Math.random() - 0.5) * SPEED,
        vy: (Math.random() - 0.5) * SPEED,
      }));
    }

    mouse = { x: -1000, y: -1000 };
    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });
    document.addEventListener('mouseleave', () => {
      mouse.x = -1000;
      mouse.y = -1000;
    });

    function tick() {
      ctx.clearRect(0, 0, width, height);

      for (const n of nodes) {
        n.x += n.vx;
        n.y += n.vy;
        if (n.x < 0 || n.x > width) n.vx *= -1;
        if (n.y < 0 || n.y > height) n.vy *= -1;
      }

      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONNECT_DIST) {
            const alpha = (1 - dist / CONNECT_DIST) * 0.15;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(nodes[j].x, nodes[j].y);
            ctx.strokeStyle = `rgba(100,120,180,${alpha})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      const MOUSE_DIST = 200;
      for (let i = 0; i < nodes.length; i++) {
        const mdx = nodes[i].x - mouse.x;
        const mdy = nodes[i].y - mouse.y;
        const mDist = Math.sqrt(mdx * mdx + mdy * mdy);

        if (mDist < MOUSE_DIST) {
          for (let j = i + 1; j < nodes.length; j++) {
            const mdx2 = nodes[j].x - mouse.x;
            const mdy2 = nodes[j].y - mouse.y;
            const mDist2 = Math.sqrt(mdx2 * mdx2 + mdy2 * mdy2);
            if (mDist2 > MOUSE_DIST) continue;

            const dx = nodes[i].x - nodes[j].x;
            const dy = nodes[i].y - nodes[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < MOUSE_DIST) {
              const alpha = (1 - dist / MOUSE_DIST) * 0.25;
              ctx.beginPath();
              ctx.moveTo(nodes[i].x, nodes[i].y);
              ctx.lineTo(nodes[j].x, nodes[j].y);
              ctx.strokeStyle = `rgba(140,170,255,${alpha})`;
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }
        }
      }

      for (const n of nodes) {
        const mdx = n.x - mouse.x;
        const mdy = n.y - mouse.y;
        const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
        const glow = mDist < MOUSE_DIST ? 0.7 : 0.3;
        ctx.beginPath();
        ctx.arc(n.x, n.y, NODE_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(140,170,255,${glow})`;
        ctx.fill();
      }

      requestAnimationFrame(tick);
    }

    window.addEventListener('resize', () => { resize(); createNodes(); });
    resize();
    createNodes();
    tick();
  </script>
</body>
</html>
